<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sun AI</title>
<style>
  :root {
    --bg: #0b1220;
    --panel: #131c2e;
    --border: #233044;
    --text: #e8ecf3;
    --muted: #8b97ad;
    --accent: #f2b705;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 24px 16px;
  }
  header { text-align: center; margin-bottom: 16px; }
  header h1 { margin: 0 0 4px; font-size: 24px; }
  header p { margin: 0; color: var(--muted); font-size: 14px; }

  .connect-bar {
    width: 100%;
    max-width: 640px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }
  .connect-bar input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-family: monospace;
    font-size: 12px;
  }
  .connect-bar button, .send-btn {
    background: var(--accent);
    color: #1a1303;
    border: none;
    padding: 7px 14px;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #d9534f; flex-shrink: 0; }
  .status-dot.on { background: #4caf50; }

  .chat {
    width: 100%;
    max-width: 640px;
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    min-height: 420px;
  }
  .messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 80%; padding: 9px 13px; border-radius: 10px; font-size: 14px; line-height: 1.45; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: var(--accent); color: #1a1303; }
  .msg.ai { align-self: flex-start; background: var(--bg); border: 1px solid var(--border); }
  .msg.system { align-self: center; color: var(--muted); font-size: 12px; }

  .input-row { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border); }
  .input-row textarea {
    flex: 1; resize: none; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 9px 12px; font-size: 14px; font-family: inherit;
  }
</style>
</head>
<body>

<header>
  <h1>☀️ Sun AI</h1>
  <p>IA para Roblox, conectada a tu Studio</p>
</header>

<div class="connect-bar">
  <span class="status-dot" id="statusDot"></span>
  <span id="statusText">Sin conectar a Studio</span>
  <input id="tokenBox" readonly placeholder="Genera un token..." />
  <button id="newTokenBtn">Generar token</button>
</div>

<div class="chat">
  <div class="messages" id="messages">
    <div class="msg system">Genera un token, pégalo en el plugin de Roblox Studio, y empieza a chatear.</div>
  </div>
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Pídele algo a la IA sobre tu juego..."></textarea>
    <button class="send-btn" id="sendBtn">Enviar</button>
  </div>
</div>

<script>
  // ⚠️ Cambia esto por la URL real de tu backend una vez lo despliegues
  // (Railway, Render, Fly.io, etc.) — nunca pongas tu API key aquí.
  const BACKEND_URL = "https://TU-BACKEND.up.railway.app";

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");
  const tokenBox = document.getElementById("tokenBox");
  const newTokenBtn = document.getElementById("newTokenBtn");
  const statusDot = document.getElementById("statusDot");
  const statusText = document.getElementById("statusText");

  let token = localStorage.getItem("sunai_token") || "";
  if (token) tokenBox.value = token;

  function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  newTokenBtn.addEventListener("click", async () => {
    newTokenBtn.disabled = true;
    newTokenBtn.textContent = "Generando...";
    try {
      const res = await fetch(BACKEND_URL + "/api/token", { method: "POST" });
      const data = await res.json();
      token = data.token;
      tokenBox.value = token;
      localStorage.setItem("sunai_token", token);
      addMessage("system", "Token generado. Pégalo en el plugin de Roblox Studio para conectar.");
    } catch (err) {
      addMessage("system", "No se pudo conectar al backend: " + err.message);
    } finally {
      newTokenBtn.disabled = false;
      newTokenBtn.textContent = "Generar token";
    }
  });

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    if (!token) {
      addMessage("system", "Primero genera un token arriba.");
      return;
    }
    addMessage("user", text);
    inputEl.value = "";
    sendBtn.disabled = true;

    try {
      const res = await fetch(BACKEND_URL + "/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, message: text }),
      });
      const data = await res.json();
      if (data.error) {
        addMessage("system", "Error: " + data.error);
      } else {
        addMessage("ai", data.reply);
        statusDot.classList.toggle("on", !!data.studioConnected);
        statusText.textContent = data.studioConnected ? "Studio conectado" : "Sin conectar a Studio";
      }
    } catch (err) {
      addMessage("system", "No se pudo contactar al backend: " + err.message);
    } finally {
      sendBtn.disabled = false;
    }
  }

  sendBtn.addEventListener("click", sendMessage);
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>

</body>
</html>
