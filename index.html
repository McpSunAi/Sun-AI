<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sun AI - Gemini & Claude Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d1117; user-select: none; }
        .smooth { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .click-pop:active { transform: scale(0.97); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #21262d; border-radius: 10px; }
    </style>
</head>
<body class="text-[#c9d1d9] h-screen flex overflow-hidden">

    <audio id="click-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto"></audio>

    <div id="setup-screen" class="fixed inset-0 bg-[#0d1117] flex flex-col items-center justify-center z-50 p-6 smooth">
        <div class="w-full max-w-md bg-[#161b22] border border-[#30363d] rounded-2xl p-8 shadow-2xl text-center space-y-6">
            <div class="text-5xl animate-bounce">☀️</div>
            <div>
                <h2 class="text-2xl font-bold text-white tracking-tight">Vincular Sun AI Global</h2>
                <p class="text-sm text-[#8b949e] mt-2">Genera un token de acceso y pégalo dentro de tu plugin en Roblox Studio.</p>
            </div>
            <div class="space-y-4">
                <button id="generate-token-btn" class="click-pop smooth w-full py-3 bg-gradient-to-r from-amber-400 to-orange-500 text-[#0d1117] font-bold rounded-xl text-sm cursor-pointer shadow-lg flex items-center justify-center gap-2">
                    <i data-lucide="sparkles" class="w-4 h-4"></i>
                    <span>Generar Token Único</span>
                </button>
                <div id="token-display-box" class="hidden space-y-4 pt-2">
                    <div class="flex items-center justify-between bg-[#0d1117] border border-[#30363d] rounded-xl px-4 py-3">
                        <span id="generated-token" class="font-mono text-amber-400 font-bold text-base tracking-wider">SUNAI-XXXXXX</span>
                        <button id="copy-token-btn" class="text-[#8b949e] hover:text-white p-2 bg-[#21262d] rounded-lg border border-[#30363d] smooth cursor-pointer flex items-center justify-center">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <a href="https://create.roblox.com/store/asset/119769170177527/SunAIConector" target="_blank" class="click-pop smooth w-full py-2.5 bg-[#00a2ff] hover:bg-[#008edb] text-white font-bold rounded-xl text-xs flex items-center justify-center gap-2 shadow-md">
                        <img src="https://images.rbxcdn.com/2bbb815fece386180ecaa976d8b08493.png" class="w-4 h-4 invert brightness-200" alt="Roblox">
                        <span>¿No tienes el Plugin? Descárgalo aquí</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <aside class="w-72 bg-[#161b22] border-r border-[#30363d] flex flex-col h-full z-10 hidden" id="main-sidebar">
        <div class="p-4 space-y-3">
            <button id="new-chat-btn" class="click-pop smooth w-full flex items-center gap-3 px-4 py-3 bg-[#21262d] hover:bg-[#30363d] text-white rounded-full text-sm font-medium border border-[#30363d] cursor-pointer">
                <i data-lucide="plus" class="w-4 h-4 text-amber-400"></i>
                <span>Nuevo chat</span>
            </button>
        </div>
        <div id="chats-container" class="flex-1 overflow-y-auto px-3 space-y-1"></div>
        <div class="p-4 border-t border-[#30363d]">
            <button id="logout-btn" class="w-full py-2 bg-red-950/40 hover:bg-red-900/60 border border-red-800/60 text-red-400 text-xs font-semibold rounded-lg smooth cursor-pointer flex items-center justify-center gap-2">
                <i data-lucide="log-out" class="w-3.5 h-3.5"></i> Cambiar de Cuenta / Salir
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-full overflow-hidden hidden" id="main-content-area">
        <header class="h-16 border-b border-[#30363d] bg-[#0d1117] flex items-center justify-between px-8">
            <div><span class="text-[#8b949e] text-xs font-medium uppercase bg-[#161b22] px-2.5 py-1 rounded-md border border-[#30363d]">Workspace Activo</span></div>
            <div class="flex items-center gap-3 bg-[#161b22] border border-[#30363d] px-4 py-1.5 rounded-full">
                <div class="text-right">
                    <p id="roblox-username" class="text-xs font-bold text-white">Cargando...</p>
                    <div class="flex items-center justify-end gap-1">
                        <div class="w-1.5 h-1.5 rounded-full bg-emerald-500"></div>
                        <span class="text-[10px] text-emerald-400 font-medium">Conectado</span>
                    </div>
                </div>
                <img id="roblox-avatar" src="https://images.rbxcdn.com/2bbb815fece386180ecaa976d8b08493.png" alt="Avatar" class="w-8 h-8 rounded-full border border-[#30363d]">
            </div>
        </header>

        <main class="flex-1 flex flex-col justify-between p-8 max-w-4xl w-full mx-auto relative overflow-hidden">
            <div id="chat-history" class="flex-1 overflow-y-auto space-y-6 mb-6 pr-2"></div>
            
            <div class="w-full flex gap-3 items-center bg-[#161b22] px-4 py-3 rounded-full border border-[#30363d] focus-within:border-[#444c56] smooth shadow-xl mb-2">
                <select id="model-select" class="bg-[#21262d] text-xs text-white px-3 py-1.5 rounded-full border border-[#30363d] cursor-pointer smooth hover:border-amber-400 max-w-[190px] focus:outline-none">
                    <optgroup label="☀️ Google Gemini" class="bg-[#161b22]">
                        <option value="gemini-1.5-flash">🚀 Gemini 1.5 Flash</option>
                        <option value="gemini-1.5-pro">🧠 Gemini 1.5 Pro</option>
                    </optgroup>
                    <optgroup label="⚡ Groq (Llama 3)" class="bg-[#161b22]">
                        <option value="llama-3.3-70b-versatile">🦙 Llama 3.3 70B (Pro)</option>
                        <option value="llama-3.1-8b-instant">💨 Llama 3.1 8B (Instant)</option>
                    </optgroup>
                </select>

                <input id="prompt-input" type="text" placeholder="Escribe tu orden aquí..." class="flex-1 bg-transparent py-1 text-sm focus:outline-none text-white">
                <button id="send-command-btn" class="click-pop smooth p-2.5 bg-amber-400 hover:bg-amber-500 text-[#0d1117] rounded-full cursor-pointer">
                    <i data-lucide="send" class="w-4 h-4"></i>
                </button>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        // ... (el resto de tu script original)
        // [MANTÉN TODO TU CÓDIGO JS AQUÍ ABAJO IGUAL QUE ANTES]
    </script>
</body>
</html>
