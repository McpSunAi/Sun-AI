<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sun AI - Gemini & Claude Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d1117; user-select: none; }
        .smooth { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .click-pop:active { transform: scale(0.97); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #21262d; border-radius: 10px; }
    </style>
</head>
<body class="text-[#c9d1d9] h-screen flex overflow-hidden">

    <audio id="click-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto"></audio>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="fixed inset-0 bg-[#0d1117] flex flex-col items-center justify-center z-50 p-6 smooth">
        <div class="w-full max-w-md bg-[#161b22] border border-[#30363d] rounded-2xl p-8 shadow-2xl text-center space-y-6">
            <div class="text-5xl animate-bounce">☀️</div>
            <div>
                <h2 class="text-2xl font-bold text-white tracking-tight">Vincular Sun AI Global</h2>
                <p class="text-sm text-[#8b949e] mt-2">Genera un token de acceso y pégalo dentro de tu plugin en Roblox Studio.</p>
            </div>
            <div class="space-y-4">
                <button id="generate-token-btn" class="click-pop smooth w-full py-3 bg-gradient-to-r from-amber-400 to-orange-500 text-[#0d1117] font-bold rounded-xl text-sm cursor-pointer shadow-lg flex items-center justify-center gap-2">
                    <i data-lucide="sparkles" class="w-4 h-4"></i>
                    <span>Generar Token Único</span>
                </button>
                <div id="token-display-box" class="hidden space-y-4 pt-2">
                    <div class="flex items-center justify-between bg-[#0d1117] border border-[#30363d] rounded-xl px-4 py-3">
                        <span id="generated-token" class="font-mono text-amber-400 font-bold text-base tracking-wider">SUNAI-XXXXXX</span>
                        <button id="copy-token-btn" class="text-[#8b949e] hover:text-white p-2 bg-[#21262d] rounded-lg border border-[#30363d] smooth cursor-pointer flex items-center justify-center">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <a href="https://create.roblox.com/store/asset/119769170177527/SunAIConector" target="_blank" class="click-pop smooth w-full py-2.5 bg-[#00a2ff] hover:bg-[#008edb] text-white font-bold rounded-xl text-xs flex items-center justify-center gap-2 shadow-md">
                        <img src="https://images.rbxcdn.com/2bbb815fece386180ecaa976d8b08493.png" class="w-4 h-4 invert brightness-200" alt="Roblox">
                        <span>¿No tienes el Plugin? Descárgalo aquí</span>
                    </a>
                    <div class="flex items-center justify-center gap-2 text-xs text-slate-400 py-1">
                        <div class="w-3.5 h-3.5 border-2 border-amber-400 border-t-transparent rounded-full animate-spin"></div>
                        <span>Esperando enlace desde Roblox Studio...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside class="w-72 bg-[#161b22] border-r border-[#30363d] flex flex-col h-full z-10 hidden" id="main-sidebar">
        <div class="p-4 space-y-3">
            <button id="new-chat-btn" class="click-pop smooth w-full flex items-center gap-3 px-4 py-3 bg-[#21262d] hover:bg-[#30363d] text-white rounded-full text-sm font-medium border border-[#30363d] cursor-pointer">
                <i data-lucide="plus" class="w-4 h-4 text-amber-400"></i>
                <span>Nuevo chat</span>
            </button>
        </div>
        <div id="chats-container" class="flex-1 overflow-y-auto px-3 space-y-1"></div>
        <div class="p-4 border-t border-[#30363d]">
            <button id="logout-btn" class="w-full py-2 bg-red-950/40 hover:bg-red-900/60 border border-red-800/60 text-red-400 text-xs font-semibold rounded-lg smooth cursor-pointer flex items-center justify-center gap-2">
                <i data-lucide="log-out" class="w-3.5 h-3.5"></i> Cambiar de Cuenta / Salir
            </button>
        </div>
    </aside>

    <!-- MAIN CHAT INTERFACE -->
    <div class="flex-1 flex flex-col h-full overflow-hidden hidden" id="main-content-area">
        <header class="h-16 border-b border-[#30363d] bg-[#0d1117] flex items-center justify-between px-8">
            <div><span class="text-[#8b949e] text-xs font-medium uppercase bg-[#161b22] px-2.5 py-1 rounded-md border border-[#30363d]">Workspace Activo</span></div>
            <div class="flex items-center gap-3 bg-[#161b22] border border-[#30363d] px-4 py-1.5 rounded-full">
                <div class="text-right">
                    <p id="roblox-username" class="text-xs font-bold text-white">Cargando...</p>
                    <div class="flex items-center justify-end gap-1">
                        <div class="w-1.5 h-1.5 rounded-full bg-emerald-500"></div>
                        <span class="text-[10px] text-emerald-400 font-medium">Conectado</span>
                    </div>
                </div>
                <img id="roblox-avatar" src="https://images.rbxcdn.com/2bbb815fece386180ecaa976d8b08493.png" alt="Avatar" class="w-8 h-8 rounded-full border border-[#30363d]">
            </div>
        </header>

        <main class="flex-1 flex flex-col justify-between p-8 max-w-4xl w-full mx-auto relative overflow-hidden">
            <div id="chat-history" class="flex-1 overflow-y-auto space-y-6 mb-6 pr-2"></div>
            
            <div class="w-full flex gap-3 items-center bg-[#161b22] px-4 py-3 rounded-full border border-[#30363d] focus-within:border-[#444c56] smooth shadow-xl mb-2">
                <select id="model-select" class="bg-[#21262d] text-xs text-white px-3 py-1.5 rounded-full border border-[#30363d] cursor-pointer smooth hover:border-amber-400 max-w-[190px] focus:outline-none">
                    <optgroup label="☀️ Google Gemini" class="bg-[#161b22]">
                        <option value="gemini-2.5-flash" selected>🚀 Gemini 2.5 Flash</option>
                        <option value="gemini-2.5-pro">🧠 Gemini 2.5 Pro (Quantum)</option>
                    </optgroup>
                    <optgroup label="🪶 Anthropic Claude" class="bg-[#161b22]">
                        <option value="claude-3-5-sonnet-latest">🎭 Claude Sonnet 4.6 (Next-Gen)</option>
                        <option value="claude-3-5-haiku-latest">⚡ Claude Haiku 4.2 (Hyper-Speed)</option>
                    </optgroup>
                </select>

                <input id="prompt-input" type="text" placeholder="Escribe tu orden aquí..." class="flex-1 bg-transparent py-1 text-sm focus:outline-none text-white">
                <button id="send-command-btn" class="click-pop smooth p-2.5 bg-amber-400 hover:bg-amber-500 text-[#0d1117] rounded-full cursor-pointer">
                    <i data-lucide="send" class="w-4 h-4"></i>
                </button>
            </div>
        </main>
    </div>

    <!-- CONTEXT MENU -->
    <div id="context-menu" class="hidden absolute bg-[#161b22] border border-[#30363d] rounded-lg shadow-xl py-1 w-40 z-50 text-xs">
        <button id="ctx-rename" class="w-full text-left px-4 py-2 hover:bg-[#21262d] text-white flex items-center gap-2"><i data-lucide="edit-2" class="w-3.5 h-3.5"></i> Renombrar</button>
        <button id="ctx-delete" class="w-full text-left px-4 py-2 hover:bg-red-950/50 text-red-400 flex items-center gap-2"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i> Eliminar</button>
    </div>

    <script>
        lucide.createIcons();
        const clickSound = document.getElementById('click-sound');
        const setupScreen = document.getElementById('setup-screen');
        const mainSidebar = document.getElementById('main-sidebar');
        const mainContentArea = document.getElementById('main-content-area');
        const generateBtn = document.getElementById('generate-token-btn');
        const tokenDisplayBox = document.getElementById('token-display-box');
        const tokenLabel = document.getElementById('generated-token');
        const copyBtn = document.getElementById('copy-token-btn');
        const chatsContainer = document.getElementById('chats-container');
        const chatHistory = document.getElementById('chat-history');
        const promptInput = document.getElementById('prompt-input');
        const sendCommandBtn = document.getElementById('send-command-btn');
        const contextMenu = document.getElementById('context-menu');
        
        let tokenActivo = localStorage.getItem('sunai_token') || "";
        let userData = JSON.parse(localStorage.getItem('sunai_user')) || null;
        let chatsList = JSON.parse(localStorage.getItem('sunai_chats')) || [{ id: 1, name: "Chat inicial ☀️", messages: [] }];
        let activeChatId = parseInt(localStorage.getItem('sunai_active_chat')) || 1;
        let rightClickedChatId = null;
        let listenInterval = null;

        const nombresCoolModelos = {
            'gemini-2.5-flash': 'GEMINI 2.5 FLASH',
            'gemini-2.5-pro': 'GEMINI 2.5 PRO (QUANTUM)',
            'claude-3-5-sonnet-latest': 'CLAUDE SONNET 4.6 (NEXT-GEN)',
            'claude-3-5-haiku-latest': 'CLAUDE HAIKU 4.2 (HYPER-SPEED)'
        };

        function playClick() { clickSound.currentTime = 0; clickSound.play(); }

        if (tokenActivo && userData) { entrarAlWorkspace(); }

        generateBtn.onclick = async () => {
            playClick();
            const randomHex = Math.random().toString(16).substring(2, 8).toUpperCase();
            tokenActivo = `SUNAI-${randomHex}`;
            tokenLabel.innerText = tokenActivo;
            generateBtn.classList.add('hidden');
            tokenDisplayBox.classList.remove('hidden');

            copyBtn.onclick = () => {
                playClick();
                navigator.clipboard.writeText(tokenActivo).then(() => {
                    copyBtn.innerHTML = `<i data-lucide="check" class="w-4 h-4 text-emerald-400"></i>`;
                    lucide.createIcons();
                    setTimeout(() => { copyBtn.innerHTML = `<i data-lucide="copy" class="w-4 h-4"></i>`; lucide.createIcons(); }, 1500);
                });
            };

            try {
                await fetch('https://sun-ai-1au5.onrender.com/api/registrar-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: tokenActivo })
                });
            } catch(e) {}
            listenInterval = setInterval(checkPluginHandshake, 2000);
        };

        async function checkPluginHandshake() {
            try {
                const res = await fetch('https://sun-ai-1au5.onrender.com/api/obtener-comando', { headers: { 'Authorization': tokenActivo } });
                const userHeader = res.headers.get('Roblox-User');
                const idHeader = res.headers.get('Roblox-Id');

                if (userHeader) {
                    clearInterval(listenInterval);
                    userData = { name: userHeader, id: idHeader || "1" };
                    localStorage.setItem('sunai_token', tokenActivo);
                    localStorage.setItem('sunai_user', JSON.stringify(userData));
                    entrarAlWorkspace();
                }
            } catch (e) {}
        }

        function entrarAlWorkspace() {
            if(setupScreen) setupScreen.remove();
            mainSidebar.classList.remove('hidden');
            mainContentArea.classList.remove('hidden');
            document.getElementById('roblox-username').innerText = userData.name;
            if(userData.id !== "1") {
                document.getElementById('roblox-avatar').src = `https://www.roblox.com/headshot-thumbnail/image?userId=${userData.id}&width=150&height=150&format=png`;
            }
            renderChats();
            loadActiveChatMessages();
        }

        function renderChats() {
            chatsContainer.innerHTML = '';
            chatsList.forEach(chat => {
                const isActive = chat.id === activeChatId;
                const btn = document.createElement('button');
                btn.className = `click-pop smooth w-full text-left px-4 py-2.5 rounded-lg text-xs font-medium flex items-center justify-between cursor-pointer ${isActive ? 'bg-[#30363d] text-white' : 'text-[#8b949e] hover:bg-[#21262d]'}`;
                btn.innerHTML = `<div class="flex items-center gap-2.5 truncate"><i data-lucide="message-square" class="w-3.5 h-3.5"></i><span class="truncate">${chat.name}</span></div>`;
                btn.onclick = () => { playClick(); activeChatId = chat.id; localStorage.setItem('sunai_active_chat', activeChatId); renderChats(); loadActiveChatMessages(); };
                btn.oncontextmenu = (e) => { e.preventDefault(); rightClickedChatId = chat.id; contextMenu.style.top = `${e.pageY}px`; contextMenu.style.left = `${e.pageX}px`; contextMenu.classList.remove('hidden'); };
                chatsContainer.appendChild(btn);
            });
            localStorage.setItem('sunai_chats', JSON.stringify(chatsList));
            lucide.createIcons();
        }

        document.getElementById('ctx-rename').onclick = () => {
            contextMenu.classList.add('hidden');
            const nuevoNombre = prompt("Introduce el nuevo nombre del chat:");
            if(nuevoNombre && nuevoNombre.trim() !== "") {
                const chat = chatsList.find(c => c.id === rightClickedChatId);
                if(chat) { chat.name = nuevoNombre.trim(); renderChats(); }
            }
        };

        document.getElementById('ctx-delete').onclick = () => {
            contextMenu.classList.add('hidden');
            if(chatsList.length <= 1) return alert("No puedes borrar todos tus chats.");
            chatsList = chatsList.filter(c => c.id !== rightClickedChatId);
            if(activeChatId === rightClickedChatId) activeChatId = chatsList[0].id;
            localStorage.setItem('sunai_active_chat', activeChatId);
            renderChats();
            loadActiveChatMessages();
        };

        window.onclick = () => contextMenu.classList.add('hidden');

        document.getElementById('new-chat-btn').onclick = () => {
            playClick();
            const newId = Date.now();
            chatsList.push({ id: newId, name: `Conversación ${chatsList.length + 1}`, messages: [] });
            activeChatId = newId;
            localStorage.setItem('sunai_active_chat', activeChatId);
            renderChats();
            loadActiveChatMessages();
        };

        function loadActiveChatMessages() {
            chatHistory.innerHTML = '';
            const chat = chatsList.find(c => c.id === activeChatId);
            if(!chat || chat.messages.length === 0) {
                chatHistory.innerHTML = `<div class="h-full flex flex-col justify-center py-12 text-center"><h2 class="text-3xl font-bold text-white">Hola, ${userData.name}.</h2><p class="text-sm text-[#8b949e] mt-1">¿Qué estructura quieres inyectar hoy?</p></div>`;
                return;
            }
            chat.messages.forEach(msg => {
                if(msg.role === 'user') {
                    chatHistory.insertAdjacentHTML('beforeend', `<div class="flex justify-end ml-auto"><div class="bg-[#21262d] border border-[#30363d] px-4 py-2.5 rounded-2xl text-sm text-white max-w-xl">${msg.text}</div></div>`);
                } else {
                    const tagCool = nombresCoolModelos[msg.model] || msg.model;
                    const esError = msg.text.startsWith('⚠️');
                    const fondoClase = esError ? 'bg-red-950/30 border-red-800/50 text-red-200' : 'bg-[#161b22] border-[#30363d] text-white';
                    chatHistory.insertAdjacentHTML('beforeend', `<div class="flex flex-col gap-1"><span class="text-[9px] ${esError ? 'text-red-400' : 'text-amber-400'} font-mono font-bold bg-[#161b22] px-1.5 py-0.5 rounded border border-[#30363d] w-max">🤖 ${tagCool}</span><div class="${fondoClase} border px-4 py-2.5 rounded-2xl text-sm whitespace-pre-wrap max-w-xl">${msg.text}</div></div>`);
                }
            });
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        sendCommandBtn.onclick = async () => {
            const prompt = promptInput.value.trim();
            const mod = document.getElementById('model-select').value;
            if(!prompt) return;

            const chat = chatsList.find(c => c.id === activeChatId);
            chat.messages.push({ role: 'user', text: prompt });
            renderChats();
            loadActiveChatMessages();
            promptInput.value = '';

            const loadingId = "loading-box";
            chatHistory.insertAdjacentHTML('beforeend', `<div id="${loadingId}" class="text-xs text-slate-500 italic animate-pulse">Pensando...</div>`);
            chatHistory.scrollTop = chatHistory.scrollHeight;

            try {
                const response = await fetch('https://sun-ai-1au5.onrender.com/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: tokenActivo, message: prompt, model: mod })
                });
                
                const data = await response.json();
                if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
                
                if (data.reply) {
                    chat.messages.push({ role: 'model', model: mod, text: data.reply });
                } else if (data.error) {
                    chat.messages.push({ role: 'model', model: mod, text: `⚠️ ERROR: ${data.error}` });
                } else {
                    chat.messages.push({ role: 'model', model: mod, text: "⚠️ Ocurrió una respuesta desconocida desde el servidor." });
                }
                renderChats();
                loadActiveChatMessages();
            } catch (err) { 
                if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
                chat.messages.push({ role: 'model', model: mod, text: `⚠️ ERROR DE RED: No se pudo conectar con el servidor backend en Render. Verifica si está encendido.` });
                renderChats();
                loadActiveChatMessages();
            }
        };

        document.getElementById('logout-btn').onclick = () => { localStorage.clear(); window.location.reload(); };
        promptInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendCommandBtn.click(); });
    </script>
</body>
</html>
